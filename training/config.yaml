# ============================================================
# Anti-Gravity Deepfake Detection — Training Configuration
# ============================================================

model:
  # Model 1: Spatial CNN
  cnn_backbone: "efficientnet_b4"
  cnn_pretrained: true
  cnn_dropout: 0.4
  cnn_weight: 0.40                # Ensemble weight

  # Model 2: Vision Transformer
  vit_backbone: "vit_base_patch16_224"
  vit_pretrained: true
  vit_dropout: 0.3
  vit_weight: 0.30                # Ensemble weight

  # Model 3: Temporal CNN+LSTM
  temporal_backbone: "resnet18"
  temporal_pretrained: true
  temporal_hidden_size: 256
  temporal_num_layers: 2
  temporal_bidirectional: true
  temporal_weight: 0.30           # Ensemble weight

  # Image settings
  image_size: 224
  sequence_length: 16             # Frames per video clip (temporal model)

training:
  epochs: 50
  batch_size: 16
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  label_smoothing: 0.1
  early_stopping_patience: 7
  gradient_clip_norm: 1.0
  mixed_precision: true           # torch.cuda.amp
  num_workers: 0                  # Fixed Windows PyTorch Shared Memory crash
  pin_memory: true
  seed: 42

  # Learning Rate Scheduler
  scheduler: "cosine_annealing"   # Options: cosine_annealing, step_lr, reduce_on_plateau
  warmup_epochs: 3
  min_lr: 1.0e-7
  T_max: 50                       # For CosineAnnealingLR

  # Loss
  loss_function: "focal_loss"

data:
  # Paths (update after preprocessing)
  train_manifest: "datasets/manifests/train.csv"
  val_manifest: "datasets/manifests/val.csv"
  test_manifest: "datasets/manifests/test.csv"

  # Splits
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

  # Dataset mixing weights
  faceforensics_weight: 0.35
  dfdc_weight: 0.35
  celebdf_weight: 0.20
  forgerynet_weight: 0.10

  # Class balancing
  oversample_minority: true
  max_oversample_ratio: 2.0

augmentation:
  horizontal_flip_prob: 0.5
  brightness_contrast_prob: 0.3
  gaussian_blur_prob: 0.2
  jpeg_quality_min: 70
  jpeg_quality_max: 100
  coarse_dropout_prob: 0.2
  rotation_limit: 10

evaluation:
  threshold: 0.5                  # Probability threshold for FAKE classification
  metrics: ["accuracy", "precision", "recall", "f1", "roc_auc"]

logging:
  use_tensorboard: true
  use_wandb: false                # Set true and configure WANDB_API_KEY to enable
  wandb_project: "antigravity-deepfake"
  wandb_entity: ""
  log_interval: 10                # Log every N batches
  save_checkpoint_every: 5        # Save checkpoint every N epochs

paths:
  weights_dir: "weights"
  logs_dir: "logs"
  results_dir: "results"
  uploads_dir: "uploads"
